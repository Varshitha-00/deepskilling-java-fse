<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Library Test Client</title>
  <style>body{font-family:Segoe UI,Roboto,Arial;margin:20px}button,input{margin:6px 0}</style>
</head>
<body>
  <h1>Library Test Client</h1>
  <button id="get">Reload Books</button>
  <ul id="books"></ul>
  <form id="addForm">
    <input id="title" placeholder="Title" required />
    <button type="submit">Add Book</button>
  </form>
  <pre id="output"></pre>

  <script>
    const booksEl = document.getElementById('books');
    const out = document.getElementById('output');

    async function load() {
      try {
        const res = await fetch('/books');
        const data = await res.json();
        booksEl.innerHTML = '';
        data.forEach(b => {
          const li = document.createElement('li');
          li.textContent = `${b.id || '-'}: ${b.title}`;
          booksEl.appendChild(li);
        });
        out.textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        out.textContent = e;
      }
    }

    document.getElementById('get').addEventListener('click', load);

    document.getElementById('addForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('title').value;
      try {
        const res = await fetch('/books', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title })
        });
        const data = await res.json();
        out.textContent = JSON.stringify(data, null, 2);
        document.getElementById('title').value = '';
        load();
      } catch (err) {
        out.textContent = err;
      }
    });

    load();
  </script>
</body>
</html>
