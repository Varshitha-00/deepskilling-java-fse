<div class="home">
  <h1>{{ portalName }}</h1>
  <p>Browse courses, track your grades, and manage your enrollments all in one place.</p>

  <div class="stats-row">
    <div class="stat-card">
      <span class="stat-value">{{ coursesAvailable }}</span>
      <span class="stat-label">Courses Available</span>
    </div>
    <div class="stat-card">
      <span class="stat-value">{{ enrolledCount }}</span>
      <span class="stat-label">Enrolled</span>
    </div>
    <div class="stat-card">
      <span class="stat-value">{{ gpa }}</span>
      <span class="stat-label">GPA</span>
    </div>
  </div>

  <button class="btn" [disabled]="!isPortalActive" (click)="onEnrollClick()">
    Enroll Now
  </button>

  @if (message) {
    <p class="message">{{ message }}</p>
  }

  <div style="margin-top: 1.5rem;">
    <input
      type="text"
      [(ngModel)]="searchTerm"
      placeholder="Search courses..."
      class="search-input"
    />
    @if (searchTerm) {
      <p>Searching for: <strong>{{ searchTerm }}</strong></p>
    }
  </div>

  <!-- Hands-On 6: Component-level NotificationService demo -->
  <app-notification></app-notification>
</div>
